<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiaBot - Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, getAdditionalUserInfo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    // Sua configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyC3G7lgHMj6l_GiRWuPbo082eyzPQiqO6k",
        authDomain: "midiabot-fe4d5.firebaseapp.com",
        projectId: "midiabot-fe4d5",
        storageBucket: "midiabot-fe4d5.firebasestorage.app",
        messagingSenderId: "193828659008",
        appId: "1:193828659008:web:25c8e11b1e303274e8e4a5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    
    // Escopos necessários para garantir que o Google libere o nome e e-mail
    provider.addScope('https://www.googleapis.com/auth/userinfo.profile');
    provider.addScope('https://www.googleapis.com/auth/userinfo.email');

    window.loginGoogle = async () => {
        const status = document.getElementById('status');
        try {
            // 1. Abre o popup do Google
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            
            // 2. Extrai informações adicionais do perfil (onde o nome costuma estar mais acessível)
            const additionalInfo = getAdditionalUserInfo(result);
            const nomeCapturado = additionalInfo?.profile?.name || user.displayName || user.email.split('@')[0];

            // 3. Obtém as credenciais originais do Google (Tokens)
            const credential = GoogleAuthProvider.credentialFromResult(result);
            const idToken = credential.idToken;      // Usado para o tokeninfo (Identidade)
            const accessToken = credential.accessToken; // Usado para o userinfo (Autorização)
    
            if (!idToken) {
                throw new Error("Não foi possível obter o ID Token do Google.");
            }
    
            status.innerText = "Validando acesso..."; 
            
            // Console log para você validar no F12 antes do envio
            console.log("Enviando para o n8n:", { 
                email: user.email, 
                nome: nomeCapturado,
                hasAccessToken: !!accessToken 
            });

            // 4. Envia os dados para o seu Webhook do n8n
            const response = await fetch('https://awkwardgiantpanda-n8n.cloudfy.live/webhook-test/f9f1ae2e-018c-4d02-b121-b346d641bbf1', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    acao: 'login', 
                    token: idToken,
                    access_token: accessToken, // Enviando a chave de acesso para o n8n usar no HTTP Request
                    email: user.email, 
                    nome: nomeCapturado 
                })
            });
    
            const data = await response.json();
            if (response.ok && data.autorizado) {
                status.innerText = "Acesso autorizado!";
                alert('Sucesso!');
                // Aqui você pode redirecionar ou carregar a tabela de gestão
            } else {
                status.innerText = "Acesso negado.";
                alert(data.mensagem || 'Usuário não autorizado.');
            }
        } catch (error) {
            console.error("Erro no processo de login:", error);
            alert('Erro: ' + error.message);
        }
    };
    </script>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-xl max-w-sm w-full text-center border-t-4 border-[#00b34d]">
        <img src="./logo.png" alt="MidiaBot" class="w-24 mx-auto mb-6">
        <h1 class="text-2xl font-bold text-[#001f3f] mb-2">Mídia Bot</h1>
        <p class="text-gray-500 mb-8 text-sm">Painel de Controle de Automações</p>
        <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-2.5 px-4 rounded-lg hover:bg-gray-50 transition font-medium text-gray-700">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
            </svg>
            Entrar com Google
        </button>
        <div id="status" class="mt-4 text-xs text-gray-400"></div>
    </div>
</body>
</html>
