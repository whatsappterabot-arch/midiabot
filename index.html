<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiaBot - Gestão Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center">
        <!-- Seu Símbolo -->
        <img src="logo.png" alt="MidiaBot Logo" class="w-24 h-24 mx-auto mb-6 rounded-full shadow-sm">
        
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Painel MidiaBot</h1>
        <p class="text-gray-600 mb-8">Gerencie suas bases de dados e automações em um só lugar.</p>

        <!-- Botão de Login (Simulação) -->
        <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-md hover:bg-gray-50 transition duration-300">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5">
            Entrar com Google
        </button>

        <div id="status" class="mt-6 text-sm text-blue-600 hidden">
            Comunicando com n8n...
        </div>
    </div>

    <script>
        function loginGoogle() {
            const status = document.getElementById('status');
            status.classList.remove('hidden');
            
            // Aqui futuramente entrará a lógica do Firebase/Google
            alert('Iniciando integração com Google Auth via n8n...');
            
            // Exemplo de como você chamará o n8n no futuro:
            // fetch('SUA_URL_WEBHOOK_N8N', { method: 'POST', body: JSON.stringify({acao: 'login'}) })
        }
    </script>

</body>
</html>
