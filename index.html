<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiaBot - Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3G7lgHMj6l_GiRWuPbo082eyzPQiqO6k",
            authDomain: "midiabot-fe4d5.firebaseapp.com",
            projectId: "midiabot-fe4d5",
            storageBucket: "midiabot-fe4d5.firebasestorage.app",
            messagingSenderId: "193828659008",
            appId: "1:193828659008:web:25c8e11b1e303274e8e4a5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.loginGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const token = await user.getIdToken();
                
                document.getElementById('status').innerText = `Olá, ${user.displayName}! Validando acesso...`;
                
                // Envia o Token para o seu n8n
                const response = await fetch('https://awkwardgiantpanda-n8n.cloudfy.live/webhook-test/f9f1ae2e-018c-4d02-b121-b346d641bbf1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, email: user.email })
                });

                if (response.ok) {
                    alert('Acesso liberado pelo n8n!');
                    // Aqui o n8n retornará os dados para a tabela
                }
            } catch (error) {
                console.error(error);
                alert('Erro no login: ' + error.message);
            }
        };
    </script>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-xl max-w-sm w-full text-center border-t-4 border-[#00b34d]">
        <img src="logo.png" alt="MidiaBot" class="w-24 mx-auto mb-6">
        <h1 class="text-2xl font-bold text-[#001f3f] mb-2">Mídia Bot</h1>
        <p class="text-gray-500 mb-8 text-sm">Painel de Controle de Automações</p>

        <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-2.5 px-4 rounded-lg hover:bg-gray-50 transition font-medium text-gray-700">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5">
            Entrar com Google
        </button>
        <div id="status" class="mt-4 text-xs text-gray-400"></div>
    </div>
</body>
</html>
