<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiaBot - Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3G7lgHMj6l_GiRWuPbo082eyzPQiqO6k",
            authDomain: "midiabot-fe4d5.firebaseapp.com",
            projectId: "midiabot-fe4d5",
            storageBucket: "midiabot-fe4d5.firebasestorage.app",
            messagingSenderId: "193828659008",
            appId: "1:193828659008:web:25c8e11b1e303274e8e4a5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Escopos para garantir acesso aos dados do perfil
        provider.addScope('https://www.googleapis.com/auth/userinfo.profile');
        provider.addScope('https://www.googleapis.com/auth/userinfo.email');

        window.loginGoogle = async () => {
            const status = document.getElementById('status');
            try {
                const result = await signInWithPopup(auth, provider);
                const credential = GoogleAuthProvider.credentialFromResult(result);
                const idToken = credential.idToken;
                const accessToken = credential.accessToken;

                if (!idToken || !accessToken) throw new Error("Tokens não gerados.");

                status.innerText = "Autenticando...";

                const response = await fetch('https://awkwardgiantpanda-n8n.cloudfy.live/webhook-test/f9f1ae2e-018c-4d02-b121-b346d641bbf1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        acao: 'login', 
                        token: idToken, 
                        access_token: accessToken,
                        email: result.user.email 
                    })
                });

                const data = await response.json();
                if (response.ok && data.autorizado) {
                    // Armazena dados e troca a tela
                    localStorage.setItem('user', JSON.stringify(data.usuario));
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    document.getElementById('user-name-display').innerText = data.usuario.nome || result.user.displayName;
                } else {
                    alert('Erro na autorização.');
                }
            } catch (error) {
                console.error(error);
                alert('Erro: ' + error.message);
            }
        };

        // Função para alternar entre WhatsApp e Instagram
        window.switchContext = (context) => {
            const isWA = context === 'wa';
            const waMenu = document.getElementById('menu-wa');
            const igMenu = document.getElementById('menu-ig');
            const btnWA = document.getElementById('btn-wa');
            const btnIG = document.getElementById('btn-ig');

            if (isWA) {
                waMenu.classList.remove('hidden');
                igMenu.classList.add('hidden');
                btnWA.className = "px-6 py-2 rounded-full bg-[#00b34d] text-white font-bold shadow-md";
                btnIG.className = "px-6 py-2 rounded-full text-gray-500 hover:bg-gray-200";
            } else {
                waMenu.classList.add('hidden');
                igMenu.classList.remove('hidden');
                btnIG.className = "px-6 py-2 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold shadow-md";
                btnWA.className = "px-6 py-2 rounded-full text-gray-500 hover:bg-gray-200";
            }
        };
    </script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="h-screen flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-xl max-w-sm w-full text-center border-t-4 border-[#00b34d]">
            <img src="./logo.png" alt="MidiaBot" class="w-24 mx-auto mb-6">
            <h1 class="text-2xl font-bold text-[#001f3f] mb-2">Mídia Bot</h1>
            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-2.5 px-4 rounded-lg hover:bg-gray-50 transition font-medium text-gray-700">
                Entrar com Google
            </button>
            <div id="status" class="mt-4 text-xs text-gray-400"></div>
        </div>
    </div>

    <!-- TELA DE DASHBOARD (Inicia escondida) -->
    <div id="dashboard-screen" class="hidden h-screen flex flex-col">
        
        <!-- HEADER COM TOGGLE -->
        <header class="bg-white shadow-sm p-4 flex justify-between items-center px-8">
            <div class="flex items-center gap-4">
                <img src="./logo.png" class="w-8">
                <div class="bg-gray-200 p-1 rounded-full flex gap-1">
                    <button id="btn-wa" onclick="switchContext('wa')" class="px-6 py-2 rounded-full bg-[#00b34d] text-white font-bold shadow-md">WhatsApp</button>
                    <button id="btn-ig" onclick="switchContext('ig')" class="px-6 py-2 rounded-full text-gray-500 hover:bg-gray-200">Instagram</button>
                </div>
            </div>
            <div class="text-sm font-semibold text-gray-700">Olá, <span id="user-name-display"></span></div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- SIDEBAR -->
            <aside class="w-64 bg-[#001f3f] text-white p-6 flex flex-col gap-2">
                
                <!-- MENU WHATSAPP -->
                <div id="menu-wa" class="space-y-1">
                    <p class="text-gray-400 text-[10px] uppercase tracking-widest mb-4">Gestão WhatsApp</p>
                    <a href="#" class="block p-3 rounded-lg hover:bg-blue-900 transition text-sm">Envio Ativo</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-blue-900 transition text-sm">Instâncias</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-blue-900 transition text-sm">Proibições de IA</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-blue-900 transition text-sm font-bold text-[#00b34d]">Mais Configurações</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-blue-900 transition text-sm opacity-50">Opção 5</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-blue-900 transition text-sm opacity-50">Opção 6</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-blue-900 transition text-sm opacity-50">Opção 7</a>
                </div>

                <!-- MENU INSTAGRAM -->
                <div id="menu-ig" class="hidden space-y-1">
                    <p class="text-gray-400 text-[10px] uppercase tracking-widest mb-4">Gestão Instagram</p>
                    <a href="#" class="block p-3 rounded-lg hover:bg-purple-900 transition text-sm">Opção 1</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-purple-900 transition text-sm">Opção 2</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-purple-900 transition text-sm">Opção 3</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-purple-900 transition text-sm">Opção 4</a>
                </div>

            </aside>

            <!-- CONTEÚDO PRINCIPAL -->
            <main class="flex-1 bg-gray-50 p-10 overflow-y-auto">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold text-gray-800 mb-2">Bem-vindo ao Painel</h2>
                    <p class="text-gray-500 text-sm">Selecione uma opção no menu lateral para começar.</p>
                </div>
            </main>
        </div>
    </div>

</body>
</html>
