<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiaBot - Proibições de IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <div class="flex h-screen">
        <!-- Menu Lateral -->
        <aside class="w-64 bg-[#001f3f] text-white flex flex-col">
            <div class="p-6 text-center border-b border-gray-700">
                <img src="./logo.png" alt="Logo" class="w-12 mx-auto mb-2">
                <h2 class="font-bold">MidiaBot</h2>
            </div>
            
            <!-- Toggle WhatsApp / Instagram -->
            <div class="p-4">
                <div class="flex bg-gray-800 rounded-lg p-1">
                    <button onclick="setPlataforma('whatsapp')" id="btn-wa" class="flex-1 py-1 text-xs rounded bg-[#00b34d] transition-all">WhatsApp</button>
                    <button onclick="setPlataforma('instagram')" id="btn-ig" class="flex-1 py-1 text-xs rounded hover:bg-gray-700 transition-all">Instagram</button>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-2 mt-4" id="menu-dinamico">
                <!-- Menu será preenchido via JS -->
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow p-4 flex justify-between items-center">
                <h1 class="text-xl font-semibold text-gray-800" id="page-title">Proibições de IA (WhatsApp)</h1>
                <div class="flex items-center gap-4">
                    <span id="user-name" class="text-sm text-gray-600 font-medium"></span>
                    <button onclick="logout()" class="text-red-500 hover:text-red-700"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <section class="p-8 overflow-y-auto">
                <!-- Card de Adicionar -->
                <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-200">
                    <h3 class="text-sm font-bold text-gray-700 mb-4 uppercase tracking-wider">Adicionar Novo Número à Blacklist</h3>
                    <div class="flex gap-4">
                        <input type="text" id="new-jid" placeholder="Ex: 5511999999999" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#00b34d] outline-none">
                        <button onclick="adicionarProibicao()" class="bg-[#00b34d] text-white px-6 py-2 rounded-lg font-medium hover:bg-[#00943d] transition">
                            <i class="fas fa-plus mr-2"></i> Adicionar
                        </button>
                    </div>
                </div>

                <!-- Tabela de Números -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">Remote JID (Número)</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-proibicoes" class="divide-y divide-gray-100">
                            <!-- Linhas inseridas via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        let cliente = null;
        let plataforma = 'whatsapp';
        const WEBHOOK_URL = 'https://awkwardgiantpanda-n8n.cloudfy.live/webhook/f9f1ae2e-018c-4d02-b121-b346d641bbf1';

        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('midiabot_user');
            if (!userData) { window.location.href = 'index.html'; return; }
            
            const user = JSON.parse(userData);
            cliente = Array.isArray(user) ? user[0] : user;
            document.getElementById('user-name').innerText = cliente.nome;
            
            renderMenu();
            carregarProibicoes();
        });

        function renderMenu() {
            const menu = document.getElementById('menu-dinamico');
            const items = plataforma === 'whatsapp' 
                ? [
                    { icon: 'fa-paper-plane', label: 'Envio Ativo', link: '#' },
                    { icon: 'fa-server', label: 'Instâncias', link: '#' },
                    { icon: 'fa-ban', label: 'Proibições de IA', active: true },
                    { icon: 'fa-cog', label: 'Mais Configurações', link: '#' }
                ]
                : [
                    { icon: 'fa-instagram', label: 'Opção 1', link: '#' },
                    { icon: 'fa-camera', label: 'Opção 2', link: '#' }
                ];

            menu.innerHTML = items.map(item => `
                <a href="${item.link || '#'}" class="flex items-center gap-3 px-4 py-3 rounded-lg transition ${item.active ? 'bg-[#00b34d] text-white' : 'text-gray-400 hover:bg-gray-800'}">
                    <i class="fas ${item.icon} w-5"></i>
                    <span class="text-sm font-medium">${item.label}</span>
                </a>
            `).join('');
        }

        async function carregarProibicoes() {
            const tbody = document.getElementById('lista-proibicoes');
            tbody.innerHTML = '<tr><td colspan="2" class="p-6 text-center text-gray-400">Carregando...</td></tr>';

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ acao: 'listar_proibicoes', id_cliente: cliente.id_cliente })
                });
                const data = await res.json();
                
                tbody.innerHTML = data.length ? data.map(item => `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 text-sm text-gray-700 font-mono">${item.remotejid}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="removerProibicao('${item.remotejid}')" class="text-red-400 hover:text-red-600 p-2">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `).join('') : '<tr><td colspan="2" class="p-6 text-center text-gray-400">Nenhum número proibido.</td></tr>';
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="2" class="p-6 text-center text-red-400">Erro ao carregar dados.</td></tr>';
            }
        }

        async function adicionarProibicao() {
            const jid = document.getElementById('new-jid').value;
            if(!jid) return alert('Digite o número!');

            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    acao: 'adicionar_proibicao', 
                    id_cliente: cliente.id_cliente,
                    remotejid: jid 
                })
            });

            if(res.ok) {
                document.getElementById('new-jid').value = '';
                carregarProibicoes();
            }
        }

        async function removerProibicao(jid) {
            if(!confirm('Deseja remover este número da lista?')) return;
            
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    acao: 'remover_proibicao', 
                    id_cliente: cliente.id_cliente,
                    remotejid: jid 
                })
            });
            carregarProibicoes();
        }

        function setPlataforma(p) {
            plataforma = p;
            document.getElementById('btn-wa').className = p === 'whatsapp' ? 'flex-1 py-1 text-xs rounded bg-[#00b34d]' : 'flex-1 py-1 text-xs rounded hover:bg-gray-700';
            document.getElementById('btn-ig').className = p === 'instagram' ? 'flex-1 py-1 text-xs rounded bg-[#00b34d]' : 'flex-1 py-1 text-xs rounded hover:bg-gray-700';
            document.getElementById('page-title').innerText = `Proibições de IA (${p === 'whatsapp' ? 'WhatsApp' : 'Instagram'})`;
            renderMenu();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
