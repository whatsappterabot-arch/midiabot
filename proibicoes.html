<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiaBot - Proibições de IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans overflow-hidden">

    <div class="flex h-screen">
        <!-- SIDEBAR: Menu Lateral Dinâmico -->
        <aside class="w-64 bg-[#001f3f] text-white flex flex-col border-r border-blue-900">
            <nav class="flex-1 p-4">
                <!-- MENU WHATSAPP -->
                <div id="menu-wa" class="space-y-1">
                    <p class="text-[10px] text-blue-300 uppercase tracking-widest mb-4 font-bold opacity-50 px-3">Gestão WhatsApp</p>
                    <a href="dashboard.html" class="block p-3 rounded-lg hover:bg-[#00b34d] transition-all text-sm">Dashboard</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-[#00b34d] transition-all text-sm">Envio Ativo</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-[#00b34d] transition-all text-sm">Instâncias</a>
                    
                    <!-- DESTAQUE CORRETO AQUI -->
                    <a href="proibicoes.html" class="block p-3 rounded-lg bg-[#00b34d] text-white transition-all text-sm font-bold">
                        Proibições de IA
                    </a>
                    
                    <a href="#" class="block p-3 rounded-lg hover:bg-[#00b34d] transition-all text-sm">Mais Configurações</a>
                </div>
        
                <!-- MENU INSTAGRAM -->
                <div id="menu-ig" class="hidden space-y-1">
                    <p class="text-[10px] text-purple-300 uppercase tracking-widest mb-4 font-bold opacity-50 px-3">Gestão Instagram</p>
                    <a href="dashboard.html" class="block p-3 rounded-lg hover:bg-purple-900 transition-all text-sm text-white">Dashboard</a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-purple-900 transition-all text-sm text-white">Opção 1</a>
                </div>
            </nav>
        </aside>
        <!-- CONTEÚDO PRINCIPAL -->
        <main class="flex-1 flex flex-col">
            <!-- HEADER -->
            <header class="bg-white border-b p-4 flex justify-between items-center px-8 shadow-sm">
                <div class="flex items-center gap-2">
                    <i class="fas fa-ban text-gray-400"></i>
                    <h1 class="text-sm font-bold text-gray-500 uppercase tracking-widest" id="page-title">Proibições de IA (WhatsApp)</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="user-name" class="text-sm font-bold text-gray-800">Carregando...</p>
                        <p id="user-id" class="text-[10px] text-gray-400 font-mono"></p>
                    </div>
                    <button onclick="logout()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <!-- ÁREA DE GESTÃO -->
            <section class="p-8 overflow-y-auto flex-1">
                <div class="max-w-4xl mx-auto">
                    
                    <!-- FORMULÁRIO DE INCLUSÃO -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-200">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Adicionar número à Blacklist</label>
                        <div class="flex gap-3">
                            <input type="text" id="input-numero" placeholder="Ex: 5511999999999" 
                                class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#00b34d] focus:bg-white outline-none transition-all font-mono">
                            <button onclick="executarAcao('incluir')" 
                                class="bg-[#001f3f] text-white px-8 rounded-xl font-bold text-xs hover:bg-black transition-all shadow-lg active:scale-95">
                                INCLUIR
                            </button>
                        </div>
                    </div>

                    <!-- TABELA DE RESULTADOS -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-8 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Remote JID</th>
                                    <th class="px-8 py-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-corpo" class="divide-y divide-gray-100">
                                <!-- Injetado via JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

        <script type="module">
        import { CONFIG } from './config.js';

        let user = null;
        let plataforma = 'whatsapp';

        // 1. Inicialização e Proteção de Rota (Ajustado para ler a chave 'user')
        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('user'); // Alterado para 'user' para bater com seu index.html
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }
            
            const rawUser = JSON.parse(userData);
            user = Array.isArray(rawUser) ? rawUser[0] : rawUser;
            
            // Hidratação da UI (Restaurado com crases para funcionar)
            document.getElementById('user-name').innerText = user.nome || 'Usuário';
            document.getElementById('user-id').innerText = `ID: ${user.id_cliente}`;
            
            // Exposição de funções para o escopo global
            window.setPlataforma = setPlataforma;
            window.executarAcao = executarAcao;
            window.logout = logout;

            renderMenu();
            executarAcao('listar');
        });

        // 2. Lógica de Menu Lateral Dinâmico (Sua lógica original preservada)
        function renderMenu() {
            const menu = document.getElementById('menu-dinamico');
            const waItems = [
                { icon: 'fa-paper-plane', label: 'Envio Ativo' },
                { icon: 'fa-server', label: 'Instâncias' },
                { icon: 'fa-ban', label: 'Proibições de IA', active: true },
                { icon: 'fa-cog', label: 'Mais Configurações' },
                { icon: 'fa-ellipsis-h', label: 'Opção 5' },
                { icon: 'fa-ellipsis-h', label: 'Opção 6' },
                { icon: 'fa-ellipsis-h', label: 'Opção 7' }
            ];
            const igItems = [
                { icon: 'fa-hashtag', label: 'Hashtags' },
                { icon: 'fa-users', label: 'Públicos' },
                { icon: 'fa-chart-line', label: 'Métricas' },
                { icon: 'fa-comments', label: 'Directs' }
            ];
            const items = plataforma === 'whatsapp' ? waItems : igItems;
            menu.innerHTML = items.map(item => `
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${item.active ? 'bg-[#00b34d] text-white shadow-lg' : 'text-blue-200 hover:bg-blue-900 hover:text-white'}">
                    <i class="fas ${item.icon} w-5 text-center"></i>
                    <span class="text-xs font-bold uppercase tracking-tighter">${item.label}</span>
                </a>
            `).join('');
        }

        // 3. Função Central de Comunicação (Sua lógica com o payload que você pediu)
        async function executarAcao(acao, valor = null) {
            const input = document.getElementById('input-numero');
            
            const payload = {
                origem: 'proibicoes',
                plataforma: plataforma,
                acao: acao, 
                id_cliente: user.id_cliente,
                dados: {
                    remotejid: acao === 'incluir' ? input.value : valor
                }
            };

            if (acao === 'incluir' && !payload.dados.remotejid) {
                alert("Por favor, insira um número.");
                return;
            }

            try {
                if (acao !== 'listar') statusLoading(true);
                
                // Usando a URL centralizada do config.js
                const res = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error("Erro na API");
                const data = await res.json();

                if (acao === 'listar') {
                    renderizarTabela(data);
                } else {
                    if(input) input.value = '';
                    executarAcao('listar'); 
                }
            } catch (e) {
                console.error("Falha na operação:", e);
                alert("Erro ao processar solicitação.");
            } finally {
                statusLoading(false);
            }
        }

        // 4. Renderização da Tabela (Sua lógica original preservada)
        function renderizarTabela(dados) {
            const corpo = document.getElementById('tabela-corpo');
            if (!dados || dados.length === 0) {
                corpo.innerHTML = '<tr><td colspan="2" class="p-12 text-center text-gray-300 text-xs font-bold uppercase tracking-widest">Nenhum número na lista</td></tr>';
                return;
            }
            corpo.innerHTML = dados.map(item => `
                <tr class="hover:bg-gray-50 transition-colors group">
                    <td class="px-8 py-4 text-sm text-gray-600 font-mono font-medium">${item.remotejid}</td>
                    <td class="px-8 py-4 text-right">
                        <button onclick="executarAcao('excluir', '${item.remotejid}')" 
                            class="text-gray-300 hover:text-red-500 transition-all p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 5. Toggle de Plataforma (Sua lógica original preservada)
        function setPlataforma(p) {
            plataforma = p;
            const isWA = p === 'whatsapp';
            
            document.getElementById('btn-wa').className = isWA 
                ? "flex-1 py-1.5 text-[10px] font-bold rounded-full transition-all bg-[#00b34d] text-white shadow-md"
                : "flex-1 py-1.5 text-[10px] font-bold rounded-full transition-all text-gray-400 hover:bg-gray-700";
            
            document.getElementById('btn-ig').className = !isWA 
                ? "flex-1 py-1.5 text-[10px] font-bold rounded-full transition-all bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow-md"
                : "flex-1 py-1.5 text-[10px] font-bold rounded-full transition-all text-gray-400 hover:bg-gray-700";
            
            // Corrigido com crases para o template literal
            document.getElementById('page-title').innerText = `Proibições de IA (${isWA ? 'WhatsApp' : 'Instagram'})`;
            
            renderMenu();
            executarAcao('listar');
        }

        function statusLoading(isLoading) {
            document.body.style.cursor = isLoading ? 'wait' : 'default';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
